<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rain</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 20%, #26384f 0%, #111923 45%, #070b10 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    .caption {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
      color: rgba(230, 242, 255, 0.72); font-size: 14px; letter-spacing: 0.08em;
      text-transform: uppercase; user-select: none; pointer-events: none;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
    }
    .controls {
      position: fixed; top: 20px; right: 20px; z-index: 2;
      display: grid; gap: 8px; width: min(260px, calc(100vw - 40px));
      padding: 14px 16px; border: 1px solid rgba(210, 230, 245, 0.16);
      border-radius: 18px; color: rgba(230, 242, 255, 0.82);
      background: rgba(8, 13, 20, 0.38); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .controls label {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; user-select: none;
    }
    .controls output { min-width: 44px; text-align: right; color: rgba(230, 242, 255, 0.58); font-variant-numeric: tabular-nums; }
    input[type="range"] { width: 100%; accent-color: #b8d9f2; cursor: pointer; }
    @media (max-width: 640px) {
      .controls { top: auto; right: 14px; left: 14px; bottom: 62px; width: auto; }
    }
  </style>
</head>
<body>
  <canvas id="rain" aria-label="Calming animated rain simulation"></canvas>
  <div class="controls" aria-label="Rain controls">
    <label for="intensity">Rain intensity <output id="intensityValue">60%</output></label>
    <input id="intensity" type="range" min="10" max="140" value="60" step="1" aria-label="Rain intensity" />
  </div>
  <div class="caption">calm rain</div>

  <script>
    const canvas = document.getElementById('rain');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('intensity');
    const sliderValue = document.getElementById('intensityValue');

    let width = 0, height = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
    let drops = [], ripples = [], mist = [], sparks = [];
    let special = null, specialCooldown = 8;
    let rainIntensity = Number(slider.value) / 100;

    const random = (min, max) => Math.random() * (max - min) + min;
    const landingY = () => random(height * 0.66, height * 0.98);
    const baseDropCount = () => Math.max(16, Math.floor((width * height) / 5500));
    const targetDropCount = () => Math.max(8, Math.floor(baseDropCount() * rainIntensity));

    function updateSliderLabel() {
      sliderValue.textContent = `${Math.round(rainIntensity * 100)}%`;
    }

    function reconcileDropCount() {
      const target = targetDropCount();
      while (drops.length < target) drops.push(createDrop());
      if (drops.length > target) drops.length = target;
    }

    function setIntensity(value) {
      rainIntensity = Number(value) / 100;
      updateSliderLabel();
      reconcileDropCount();
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drops = Array.from({ length: targetDropCount() }, createDrop);
      mist = Array.from({ length: Math.max(18, Math.floor(width / 55)) }, createMist);
    }

    function createDrop() {
      const depth = random(0.35, 1);
      const impactY = landingY();
      return {
        x: random(-width * 0.1, width * 1.1),
        y: random(-height, impactY - 20),
        length: random(12, 34) * depth,
        speed: random(280, 620) * depth,
        drift: random(-24, -8) * depth,
        alpha: random(0.16, 0.42) * depth,
        lineWidth: random(0.6, 1.3) * depth,
        depth,
        impactY
      };
    }

    function resetDrop(drop) {
      Object.assign(drop, createDrop(), { y: random(-160, -20) });
    }

    function createMist() {
      return {
        x: random(0, width),
        y: random(height * 0.58, height * 0.98),
        radius: random(90, 230),
        speed: random(4, 14),
        alpha: random(0.012, 0.035)
      };
    }

    function createRipple(x, y, strength = 1, warm = false) {
      ripples.push({
        x, y,
        radius: 1,
        alpha: warm ? 0.3 : 0.18,
        growth: random(18, 42) * strength,
        stretch: random(1.45, 2.15),
        warm
      });
    }

    function maybeStartSpecial(delta) {
      if (special) return;
      specialCooldown -= delta;
      if (specialCooldown > 0) return;
      if (Math.random() < delta / 140) {
        special = {
          x: random(width * 0.15, width * 0.85),
          y: -80,
          impactY: landingY(),
          speed: random(190, 260),
          drift: random(-6, 6),
          length: 42,
          phase: 'falling',
          age: 0
        };
        specialCooldown = random(80, 180);
      }
    }

    function drawBackground(time) {
      const pulse = 0.04 + Math.sin(time * 0.00018) * 0.015;
      const gradient = ctx.createRadialGradient(width * 0.5, height * 0.18, 0, width * 0.5, height * 0.22, Math.max(width, height));
      gradient.addColorStop(0, `rgba(49, 74, 104, ${0.88 + pulse})`);
      gradient.addColorStop(0.42, 'rgba(17, 25, 35, 0.96)');
      gradient.addColorStop(1, 'rgba(5, 8, 12, 1)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
    }

    function drawMist(delta) {
      for (const cloud of mist) {
        cloud.x += cloud.speed * delta;
        if (cloud.x - cloud.radius > width) {
          cloud.x = -cloud.radius;
          cloud.y = random(height * 0.58, height * 0.98);
        }
        const gradient = ctx.createRadialGradient(cloud.x, cloud.y, 0, cloud.x, cloud.y, cloud.radius);
        gradient.addColorStop(0, `rgba(180, 210, 230, ${cloud.alpha})`);
        gradient.addColorStop(1, 'rgba(180, 210, 230, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(cloud.x, cloud.y, cloud.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawDrops(delta) {
      ctx.lineCap = 'round';
      for (const drop of drops) {
        const previousY = drop.y;
        const previousX = drop.x;
        drop.x += drop.drift * delta;
        drop.y += drop.speed * delta;

        if (previousY < drop.impactY && drop.y >= drop.impactY) {
          const t = (drop.impactY - previousY) / Math.max(drop.y - previousY, 0.001);
          const impactX = previousX + (drop.x - previousX) * t;
          createRipple(impactX, drop.impactY, 0.75 + drop.depth * 0.7);
          resetDrop(drop);
          continue;
        }

        const gradient = ctx.createLinearGradient(drop.x, drop.y - drop.length, drop.x + drop.drift * 0.04, drop.y);
        gradient.addColorStop(0, 'rgba(205, 226, 242, 0)');
        gradient.addColorStop(0.45, `rgba(205, 226, 242, ${drop.alpha})`);
        gradient.addColorStop(1, 'rgba(205, 226, 242, 0)');
        ctx.strokeStyle = gradient;
        ctx.lineWidth = drop.lineWidth;
        ctx.beginPath();
        ctx.moveTo(drop.x, drop.y - drop.length);
        ctx.lineTo(drop.x + drop.drift * 0.055, drop.y);
        ctx.stroke();
      }
    }

    function drawRipples(delta) {
      for (let i = ripples.length - 1; i >= 0; i--) {
        const ripple = ripples[i];
        ripple.radius += ripple.growth * delta;
        ripple.alpha -= (ripple.warm ? 0.07 : 0.12) * delta;
        if (ripple.alpha <= 0) {
          ripples.splice(i, 1);
          continue;
        }
        ctx.strokeStyle = ripple.warm ? `rgba(255, 219, 139, ${ripple.alpha})` : `rgba(185, 210, 230, ${ripple.alpha})`;
        ctx.lineWidth = ripple.warm ? 1.4 : 1;
        ctx.beginPath();
        ctx.ellipse(ripple.x, ripple.y, ripple.radius * ripple.stretch, ripple.radius * 0.45, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawSpecial(delta) {
      maybeStartSpecial(delta);
      if (!special) return;
      special.age += delta;

      if (special.phase === 'falling') {
        const previousY = special.y;
        special.x += special.drift * delta;
        special.y += special.speed * delta;
        const trail = ctx.createLinearGradient(special.x, special.y - special.length, special.x, special.y);
        trail.addColorStop(0, 'rgba(255, 231, 158, 0)');
        trail.addColorStop(0.55, 'rgba(255, 231, 158, 0.9)');
        trail.addColorStop(1, 'rgba(255, 255, 220, 0.1)');
        ctx.strokeStyle = trail;
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.moveTo(special.x, special.y - special.length);
        ctx.lineTo(special.x + special.drift * 0.08, special.y);
        ctx.stroke();

        if (previousY < special.impactY && special.y >= special.impactY) {
          special.phase = 'bloom';
          special.age = 0;
          special.y = special.impactY;
          for (let i = 0; i < 5; i++) createRipple(special.x, special.y, 1.1 + i * 0.34, true);
          sparks = Array.from({ length: 18 }, () => ({
            x: special.x,
            y: special.y,
            vx: random(-24, 24),
            vy: random(-52, -18),
            life: random(2.5, 4.8),
            age: 0,
            size: random(1.3, 2.8)
          }));
        }
        return;
      }

      const life = 5.5;
      const fade = Math.max(0, 1 - special.age / life);
      const glowRadius = 70 + special.age * 22;
      const glow = ctx.createRadialGradient(special.x, special.y, 0, special.x, special.y, glowRadius);
      glow.addColorStop(0, `rgba(255, 224, 150, ${0.22 * fade})`);
      glow.addColorStop(1, 'rgba(255, 224, 150, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(special.x, special.y, glowRadius, 0, Math.PI * 2);
      ctx.fill();

      for (let i = sparks.length - 1; i >= 0; i--) {
        const spark = sparks[i];
        spark.age += delta;
        spark.x += spark.vx * delta;
        spark.y += spark.vy * delta;
        spark.vy += 9 * delta;
        const alpha = Math.max(0, 1 - spark.age / spark.life) * 0.75;
        ctx.fillStyle = `rgba(255, 230, 150, ${alpha})`;
        ctx.beginPath();
        ctx.arc(spark.x, spark.y, spark.size, 0, Math.PI * 2);
        ctx.fill();
        if (spark.age >= spark.life) sparks.splice(i, 1);
      }

      if (special.age >= life) {
        special = null;
        sparks = [];
      }
    }

    function drawWindowGlow(time) {
      const shimmer = 0.06 + Math.sin(time * 0.0005) * 0.025;
      const glow = ctx.createLinearGradient(0, 0, 0, height);
      glow.addColorStop(0, `rgba(170, 205, 235, ${shimmer})`);
      glow.addColorStop(0.5, 'rgba(170, 205, 235, 0.015)');
      glow.addColorStop(1, 'rgba(170, 205, 235, 0.03)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, width, height);
    }

    let last = performance.now();
    function animate(now) {
      const delta = Math.min((now - last) / 1000, 0.033);
      last = now;
      drawBackground(now);
      drawWindowGlow(now);
      drawMist(delta);
      drawDrops(delta);
      drawSpecial(delta);
      drawRipples(delta);
      requestAnimationFrame(animate);
    }

    slider.addEventListener('input', (event) => setIntensity(event.target.value));
    window.addEventListener('resize', resize, { passive: true });
    updateSliderLabel();
    resize();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
